name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile Angular App
        run: npx ng build --configuration production

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ehitelrc/harmony_web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_KEY_PATH: deploy_key
    steps:
      - name: Prepare SSH private key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "${SSH_KEY}" ]; then
            echo "::error::SSH_KEY secret is EMPTY!"
            exit 1
          fi
          printf '%s' "${SSH_KEY}" > "${DEPLOY_KEY_PATH}"
          tr -d '\r' < "${DEPLOY_KEY_PATH}" > "${DEPLOY_KEY_PATH}.tmp"
          mv "${DEPLOY_KEY_PATH}.tmp" "${DEPLOY_KEY_PATH}"
          if grep -Fq '\n' "${DEPLOY_KEY_PATH}"; then
            perl -0pe 's/\\n/\n/g' -i "${DEPLOY_KEY_PATH}"
          fi
          chmod 600 "${DEPLOY_KEY_PATH}"
          echo "=== Safe Structural Check (Base64 replaced with x) ==="
          tr 'A-Za-z0-9+/=' 'x' < "${DEPLOY_KEY_PATH}"
          echo "====================================================="
          if ! grep -Eq '^-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----$' "${DEPLOY_KEY_PATH}"; then
            echo "::error::SSH_KEY secret does not contain a private key header"
            exit 1
          fi

      - name: SSH and deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: ${{ env.DEPLOY_KEY_PATH }}
          script: |
            cd /opt/harmony
            sudo docker compose pull harmony_web
            sudo docker compose up harmony_web -d

      - name: Clean up SSH private key
        if: always()
        run: rm -f ${{ env.DEPLOY_KEY_PATH }}
